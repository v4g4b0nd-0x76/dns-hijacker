name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.name }})
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'chore: release v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gnu
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_arg: gnu
            asset: dns-hijacker-x86_64-unknown-linux-gnu
          - name: linux-musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build_arg: musl
            asset: dns-hijacker-x86_64-unknown-linux-musl
            musl: true
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            build_arg: mac
            asset: dns-hijacker-aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh "${{ matrix.build_arg }}"

      - name: Package artifact
        run: |
          src="target/${{ matrix.target }}/release/dns-hijacker"
          test -f "$src"
          cp "$src" "${{ matrix.asset }}"
          chmod +x "${{ matrix.asset }}"
          tar -czf "${{ matrix.asset }}.tar.gz" "${{ matrix.asset }}"
          shasum -a 256 "${{ matrix.asset }}" "${{ matrix.asset }}.tar.gz" > "${{ matrix.asset }}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.tar.gz
            ${{ matrix.asset }}.sha256
          if-no-files-found: error

  release:
    name: publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          msg="${{ github.event.head_commit.message }}"
          tag="$(printf '%s\n' "$msg" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)"
          if [[ -z "$tag" ]]; then
            ver="$(sed -n 's/^version = "\([0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\)"/\1/p' Cargo.toml | head -1)"
            tag="v${ver}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $tag"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
