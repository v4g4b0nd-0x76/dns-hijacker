drop_list = [
    "google.com",
    "*.example.com",
    "yahoo.com"
]

redirect_list = [
    "*.test.com:192.168.1.1",
]

resolvers = [
    "https://cloudflare-dns.com/dns-query",
    "8.8.8.8:53",
    "1.1.1.1:53",
]

[resolver_searching]
enable = true
resolver_source = [
 "https://public-dns.info/nameservers-all.txt",
 "https://raw.githubusercontent.com/trickest/resolvers/main/resolvers.txt"
]
refresh_interval = 30
ipv4 = true 
doh = true


[hotreload_conf]
enable = true 
poll_interval_ms = 100
